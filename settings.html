<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Settings - Gaja Clinic</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .stat-card { border-radius: 12px; padding: 1.25rem; color: #fff; min-height: 110px; }
        .stat-card-blue { background: linear-gradient(135deg, #1565c0, #0d47a1); }
        .stat-card-green { background: linear-gradient(135deg, #2e7d32, #1b5e20); }
        .stat-card-revenue { background: linear-gradient(135deg, #6a1b9a, #4a148c); }
        .stat-value { font-size: 1.75rem; font-weight: 700; }
        .stat-label { opacity: .9; font-size: .9rem; }
    </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark" style="background:#4a148c;">
    <div class="container-fluid">
        <span class="navbar-brand"><i class="bi bi-shield-check me-1"></i> Gaja Clinic — Admin</span>
        <div class="d-flex align-items-center gap-2">
            <a href="/main-admin/home" class="btn btn-outline-light btn-sm">Dashboard</a>
            <a href="/main-admin/pdf-archive" class="btn btn-outline-light btn-sm">PDF Archive</a>
            <a href="/main-admin/reports" class="btn btn-outline-light btn-sm">Reports</a>
            <a href="/main-admin/settings" class="btn btn-outline-light btn-sm">Settings</a>
            <form action="/account/logout" method="post" class="ms-2"><input type="hidden" name="_csrf" value="M5vp5gsTLWaq1FnkKjBVn26RJK9vO7BfT6Jpw-tzCx2xvflHC6iP12okFQSH7G_VHx1hr16pCZYMD9Zyd5db9tNEby6BhJwm"/>
                <input type="hidden" name="_csrf" value="M5vp5gsTLWaq1FnkKjBVn26RJK9vO7BfT6Jpw-tzCx2xvflHC6iP12okFQSH7G_VHx1hr16pCZYMD9Zyd5db9tNEby6BhJwm"/>
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<main>
    <h2 class="mb-1"><i class="bi bi-gear me-2"></i>Clinic Settings</h2>
    <p class="text-muted mb-4">Manage clinic information and configuration</p>

    <div id="successAlert" class="alert alert-success py-2 small d-none"><i class="bi bi-check-circle me-1"></i><span id="successMessage"></span></div>
    <div id="errorAlert" class="alert alert-danger py-2 small d-none"><i class="bi bi-exclamation-triangle me-1"></i><span id="errorMessage"></span></div>

    <form id="settingsForm" enctype="multipart/form-data" novalidate>
        <input type="hidden" name="_csrf" value="M5vp5gsTLWaq1FnkKjBVn26RJK9vO7BfT6Jpw-tzCx2xvflHC6iP12okFQSH7G_VHx1hr16pCZYMD9Zyd5db9tNEby6BhJwm"/>

        <div class="row g-4">
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-header">Clinic Information</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Clinic Name <span class="text-danger">*</span></label>
                            <input name="clinicName" value="Gaja Clinic &amp; Gaja Medicals" class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tagline</label>
                            <input name="tagline" value="Your Health, Our Priority" class="form-control"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <textarea name="address" class="form-control" rows="2">No.39, 2nd Main Road, Chitlapakkam, Tambaram Sanatorium, Chennai - 600047</textarea>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Phone</label>
                                <input name="phone" value="98844 43162" class="form-control"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input name="email" type="email" value="info@gajaclinic.local" class="form-control"/>
                            </div>
                        </div>
                        <div class="mb-3 mt-3">
                            <label class="form-label">Default Consultation Fee (₹)</label>
                            <input name="consultationFeeDefault" type="number" step="0.01" min="0"
                                   value="200.00" class="form-control"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Clinic Server URL</label>
                            <input name="publicBaseUrl" value="" class="form-control"
                                   placeholder="http://10-185-49-165.sslip.io:5226"/>
                            <small class="text-muted">
                                Suggested: <strong>http://10-185-49-165.sslip.io:5226</strong>
                            </small>
                        </div>
                        <div class="mb-0">
                            <label class="form-label">Clinic Logo</label>
                            <div class="mb-2">
                                <img id="logoPreview" src="/images/logo.png" alt="Logo" style="max-height:60px;border-radius:8px"/>
                            </div>
                            <input name="logoFile" id="logoFile" type="file" accept=".png,.jpg,.jpeg,.webp" class="form-control"/>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card">
                    <div class="card-header bg-success text-white">SMTP Settings</div>
                    <div class="card-body">
                        <input type="hidden" name="smtpPort" value="587" id="smtpPortHidden"/>
                        <input type="hidden" name="smtpEnableSsl" value="true" id="smtpSslHidden"/>
                        <div class="mb-3">
                            <label class="form-label">SMTP Host</label>
                            <input name="smtpHost" value="smtp.gmail.com" class="form-control" placeholder="smtp.gmail.com"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">SMTP Port</label>
                            <input id="smtpPortInput" type="number" value="587" class="form-control"
                                   oninput="document.getElementById('smtpPortHidden').value=this.value"/>
                        </div>
                        <div class="form-check mb-3">
                            <input type="checkbox" id="smtpSslCheck" class="form-check-input" onchange="document.getElementById('smtpSslHidden').value=this.checked" checked="checked"/>
                            <label for="smtpSslCheck" class="form-check-label">Enable SSL</label>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">SMTP Username</label>
                            <input name="smtpUser" value="placeholder@gmail.com" class="form-control"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">SMTP Password</label>
                            <input name="smtpPassword" type="password" value="placeholder_app_password" class="form-control"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">From Email</label>
                            <input name="smtpFromEmail" type="email" value="placeholder@gmail.com" class="form-control"/>
                        </div>
                        <div class="mb-0">
                            <label class="form-label">From Name</label>
                            <input name="smtpFromName" value="Gaja Clinic &amp; Gaja Medicals" class="form-control"/>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-header bg-success text-white">Doctor &amp; Prescription PDF</div>
            <div class="card-body">
                <div class="row g-4">
                    <div class="col-lg-6">
                        <div class="mb-3">
                            <label class="form-label">Doctor Name (on prescription)</label>
                            <input name="doctorDisplayName" value="Roopa Krishnan" class="form-control"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Qualifications</label>
                            <input name="doctorQualification" value="MBBS" class="form-control"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Registration Number</label>
                            <input name="doctorRegistrationNo" value="199315" class="form-control"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Specialization</label>
                            <input name="doctorSpecialization" value="GENERAL PHYSICIAN" class="form-control"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Consulting Hours</label>
                            <input name="consultingHours" value="Evening, Monday to Saturday" class="form-control"/>
                        </div>
                        <div class="mb-0">
                            <label class="form-label">Doctor Signature</label>
                            <div class="mb-2 p-2 bg-light rounded border">
                                <img id="signaturePreview" src="/uploads/prescription/doctor-signature.jpeg" alt="Signature"
                                     style="max-height:80px;max-width:220px"/>
                            </div>
                            <input name="doctorSignatureFile" id="signatureFile" type="file" accept=".png,.jpg,.jpeg,.webp" class="form-control"/>
                        </div>
                    </div>
                    <div class="col-lg-6">
                        <label class="form-label">Prescription Pad Template</label>
                        <div class="mb-2 p-2 bg-light rounded border text-center">
                            <img id="templatePreview" src="" alt="Template"
                                 style="display:none"/>
                        </div>
                        <input name="prescriptionTemplateFile" id="templateFile" type="file" accept=".png,.jpg,.jpeg,.webp" class="form-control"/>
                        <div class="mt-3">
                            <label class="form-label">Prescription Footer Message</label>
                            <input name="prescriptionFooterMessage" value="Wishing You Good Health" class="form-control"/>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4 d-flex flex-wrap gap-2">
            <button type="button" id="saveBtn" class="btn btn-primary btn-lg">
                <i class="bi bi-check-circle me-1"></i>Save Settings
            </button>
            <a href="/main-admin/home" class="btn btn-outline-secondary btn-lg">Back to Dashboard</a>
        </div>
    </form>

    <script>
        (function () {
            var saveBtn = document.getElementById('saveBtn');
            var successAlert = document.getElementById('successAlert');
            var errorAlert = document.getElementById('errorAlert');
            var saveUrl = "\/main-admin\/settings";

            function showSuccess(msg) {
                document.getElementById('successMessage').textContent = msg;
                successAlert.classList.remove('d-none');
                errorAlert.classList.add('d-none');
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="bi bi-check-circle me-1"></i>Save Settings';
            }

            function showError(msg) {
                document.getElementById('errorMessage').textContent = msg;
                errorAlert.classList.remove('d-none');
                successAlert.classList.add('d-none');
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="bi bi-check-circle me-1"></i>Save Settings';
            }

            function bindPreview(inputId, previewId) {
                var input = document.getElementById(inputId);
                if (!input) return;
                input.addEventListener('change', function () {
                    var file = this.files[0];
                    if (!file) return;
                    var reader = new FileReader();
                    reader.onload = function (e) {
                        var preview = document.getElementById(previewId);
                        preview.src = e.target.result;
                        preview.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                });
            }

            bindPreview('logoFile', 'logoPreview');
            bindPreview('signatureFile', 'signaturePreview');
            bindPreview('templateFile', 'templatePreview');

            saveBtn.addEventListener('click', function () {
                var clinicName = document.querySelector('input[name="clinicName"]').value.trim();
                if (!clinicName) {
                    showError('Clinic Name is required.');
                    return;
                }
                saveBtn.disabled = true;
                saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Saving...';
                successAlert.classList.add('d-none');
                errorAlert.classList.add('d-none');

                fetch(saveUrl, {
                    method: 'POST',
                    body: new FormData(document.getElementById('settingsForm')),
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (data.success) {
                        if (data.logoPath) document.getElementById('logoPreview').src = data.logoPath + '?t=' + Date.now();
                        if (data.doctorSignaturePath) document.getElementById('signaturePreview').src = data.doctorSignaturePath + '?t=' + Date.now();
                        if (data.prescriptionTemplatePath) document.getElementById('templatePreview').src = data.prescriptionTemplatePath + '?t=' + Date.now();
                        document.getElementById('logoFile').value = '';
                        document.getElementById('signatureFile').value = '';
                        document.getElementById('templateFile').value = '';
                        showSuccess(data.message || 'Settings saved successfully.');
                    } else {
                        showError(data.message || 'Failed to save settings.');
                    }
                })
                .catch(function (err) {
                    showError('Network or server error: ' + err.message);
                });
            });
        })();
    </script>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
