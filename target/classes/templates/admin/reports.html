<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/admin-layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Reports &amp; Export - Gaja Clinic</title>
</head>
<body>
<main>
    <h2 class="mb-1"><i class="bi bi-download me-2"></i>Reports &amp; Export</h2>
    <p class="text-muted mb-4">Download clinic data as Excel spreadsheets</p>

    <div class="row g-3">
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body text-center py-4">
                    <div class="display-6 text-primary mb-3"><i class="bi bi-people"></i></div>
                    <h5 class="fw-bold">Patients</h5>
                    <p class="text-muted small">All registered patients</p>
                    <a th:href="@{/main-admin/reports/export-patients}" class="btn btn-primary">
                        <i class="bi bi-download me-1"></i>Download
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body text-center py-4">
                    <div class="display-6 text-success mb-3"><i class="bi bi-receipt"></i></div>
                    <h5 class="fw-bold">Bills</h5>
                    <p class="text-muted small">Billing &amp; payment records</p>
                    <a th:href="@{/main-admin/reports/export-bills}" class="btn btn-success">
                        <i class="bi bi-download me-1"></i>Download
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body text-center py-4">
                    <div class="display-6 text-info mb-3"><i class="bi bi-file-earmark-pdf"></i></div>
                    <h5 class="fw-bold">PDF Archive</h5>
                    <p class="text-muted small">PDF index listing</p>
                    <a th:href="@{/main-admin/reports/export-pdf-archive}" class="btn btn-outline-primary">
                        <i class="bi bi-download me-1"></i>Download
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
