<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Created - Gaja Clinic</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/gaja-theme.css}">
</head>
<body class="gaja-app">
<nav class="navbar navbar-dark gaja-navbar">
    <div class="container-fluid">
        <span class="navbar-brand">Gaja Clinic — Pharmacy</span>
        <form th:action="@{/account/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>
<div class="container py-4">
    <div class="alert alert-success">
        <h4><i class="bi bi-check-circle me-2"></i>Bill <span th:text="${summary.billNo}"></span> created successfully</h4>
        <p class="mb-0">Patient: <strong th:text="${summary.patientName}"></strong></p>
        <p class="mb-0 mt-2 small text-warning" th:if="${summary.whatsAppShareError != null}" th:text="${summary.whatsAppShareError}"></p>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Bill Summary</div>
                <div class="card-body">
                    <p>Prescription: <strong th:text="${summary.prescriptionNumber}"></strong></p>
                    <p>Consultation Fee: ₹<span th:text="${#numbers.formatDecimal(summary.consultationFee, 1, 2)}"></span></p>
                    <p th:if="${summary.otherCharges != null and summary.otherCharges > 0}">
                        <span th:text="${summary.otherChargesDescription != null and !summary.otherChargesDescription.isEmpty() ? summary.otherChargesDescription : 'Injection / Other Charges'}"></span>:
                        ₹<span th:text="${#numbers.formatDecimal(summary.otherCharges, 1, 2)}"></span>
                    </p>
                    <p>Discount: ₹<span th:text="${#numbers.formatDecimal(summary.discount, 1, 2)}"></span></p>
                    <p class="fw-bold">Total Paid: ₹<span th:text="${#numbers.formatDecimal(summary.finalAmount, 1, 2)}"></span></p>
                    <p class="text-muted small mb-0" th:if="${summary.payment != null}">
                        Payment: <strong th:text="${summary.payment.paymentMethod}"></strong>
                        (<span th:text="${summary.payment.paymentStatus}"></span>)
                    </p>
                </div>
            </div>
        </div>
        <div class="col-md-6 d-grid gap-2 align-content-start">
            <a th:href="@{/pharmacy/bill/download-pdf(billId=${summary.billId})}" target="_blank" class="btn btn-outline-primary btn-lg">
                View Prescription PDF
            </a>
            <a th:if="${summary.whatsAppShareUrl != null}"
               th:href="@{/pharmacy/bill/share-whatsapp(billId=${summary.billId})}"
               target="_blank" rel="noopener noreferrer" class="btn btn-success btn-lg">
                Send WhatsApp
            </a>
            <button th:if="${summary.whatsAppShareUrl == null}" type="button" class="btn btn-success btn-lg" disabled>
                Send WhatsApp
            </button>
            <a th:href="@{/pharmacy/prescription}" class="btn btn-primary">Back to Pending List</a>
        </div>
    </div>
</div>
</body>
</html>
