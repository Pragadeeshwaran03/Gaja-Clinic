<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${module}">Gaja Clinic</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/gaja-theme.css}">
</head>
<body class="gaja-app">
<nav class="navbar navbar-dark gaja-navbar">
    <div class="container-fluid">
        <span class="navbar-brand"><i class="bi bi-heart-pulse-fill me-1"></i> Gaja Clinic</span>
        <div class="d-flex align-items-center text-white gap-3">
            <span><i class="bi bi-person-circle me-1"></i><span th:text="${user.displayName}">User</span>
                (<span th:text="${user.roleName}">Role</span>)</span>
            <form th:action="@{/account/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div class="container py-5">
    <div class="alert alert-success">
        <h4 class="alert-heading"><i class="bi bi-check-circle me-2"></i>Phase 1 — Login Successful</h4>
        <p class="mb-0">You are authenticated as <strong th:text="${user.roleName}">Role</strong>.
            Module placeholder: <strong th:text="${module}">Module</strong></p>
    </div>
    <p class="text-muted">Full UI modules will be migrated in later phases. Backend foundation is ready.</p>
</div>
</body>
</html>
