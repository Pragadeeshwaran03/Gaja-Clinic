<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<footer class="public-footer" th:fragment="footer">
    <div class="container">
        <div class="row g-4 align-items-center">
            <div class="col-lg-5">
                <h5 class="footer-brand mb-2">Gaja Clinic &amp; Medicals</h5>
                <p class="footer-tagline mb-0">Your Health, Our Priority</p>
                <p class="footer-muted mt-2 mb-0 small">Your Trusted Healthcare Partner in Chitlapakkam, Chennai.</p>
            </div>
            <div class="col-lg-4">
                <p class="footer-label mb-1">Contact</p>
                <p class="mb-1"><i class="bi bi-telephone-fill me-2"></i><a href="tel:9884443162">98844 43162</a></p>
                <p class="mb-0"><i class="bi bi-geo-alt-fill me-2"></i>Chitlapakkam, Chennai - 600047</p>
            </div>
            <div class="col-lg-3 text-lg-end">
                <a th:href="@{/account/login}" class="btn btn-footer-login">
                    <i class="bi bi-shield-lock me-1"></i>Staff Portal
                </a>
            </div>
        </div>
        <hr class="footer-divider"/>
        <p class="footer-copy text-center mb-0 small">&copy; <span th:text="${T(java.time.Year).now()}">2026</span> Gaja Clinic &amp; Medicals. All rights reserved.</p>
    </div>
</footer>
</body>
</html>
