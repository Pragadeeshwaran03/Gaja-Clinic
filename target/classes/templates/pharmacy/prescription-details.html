<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescription Details - Gaja Clinic</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/gaja-theme.css}">
</head>
<body class="gaja-app">
<nav class="navbar navbar-dark gaja-navbar">
    <div class="container-fluid">
        <span class="navbar-brand">Gaja Clinic — Pharmacy</span>
        <form th:action="@{/account/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
        <div>
            <h2 th:text="${prescription.prescriptionNumber}">PRES00001</h2>
            <p class="text-muted mb-0">Prescription details</p>
        </div>
        <a th:href="@{/pharmacy/bill/create(prescriptionId=${prescription.id})}" class="btn btn-success">Create Bill</a>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-3"><div class="text-muted small">Patient</div><div th:text="${prescription.patient != null ? prescription.patient.name : '—'}"></div></div>
        <div class="col-md-3"><div class="text-muted small">Code</div><div th:text="${prescription.patient != null ? prescription.patient.patientCode : '—'}"></div></div>
        <div class="col-md-3"><div class="text-muted small">Mobile</div><div th:text="${prescription.patient != null ? prescription.patient.mobile : '—'}"></div></div>
        <div class="col-md-3"><div class="text-muted small">Doctor</div><div th:text="${prescription.doctor != null && prescription.doctor.user != null ? prescription.doctor.user.fullName : '—'}"></div></div>
        <div class="col-md-3"><div class="text-muted small">Date</div><div th:text="${#temporals.format(prescription.dateCreated, 'dd/MM/yyyy HH:mm')}"></div></div>
    </div>

    <div class="card">
        <div class="card-header">Medicines</div>
        <div class="table-responsive">
            <table class="table mb-0">
                <thead><tr><th>Medicine</th><th>Dosage</th><th>Qty</th><th>Duration</th><th>Instructions</th></tr></thead>
                <tbody>
                <tr th:each="item : ${prescription.items}">
                    <td th:text="${item.medicineName}"></td>
                    <td th:text="${item.dosage}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="${item.duration}"></td>
                    <td th:text="${item.instructions}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card mt-3" th:if="${prescription.patientCondition != null and !prescription.patientCondition.isEmpty()}">
        <div class="card-header">Patient Condition</div>
        <div class="card-body">
            <p class="mb-0" th:text="${prescription.patientCondition}" style="white-space: pre-wrap;"></p>
        </div>
    </div>

    <div class="card mt-3" th:if="${prescription.notes != null and !prescription.notes.isEmpty()}">
        <div class="card-header">Doctor's Notes / Advice</div>
        <div class="card-body">
            <p class="mb-0" th:text="${prescription.notes}" style="white-space: pre-wrap;"></p>
        </div>
    </div>

    <a th:href="@{/pharmacy/prescription}" class="btn btn-outline-secondary mt-3">Back to List</a>
</div>
</body>
</html>
