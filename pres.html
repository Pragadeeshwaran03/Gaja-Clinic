<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescription Items - Gaja Clinic</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark" style="background:#0d47a1;">
    <div class="container-fluid">
        <span class="navbar-brand">Gaja Clinic — Doctor</span>
        <form action="/account/logout" method="post"><input type="hidden" name="_csrf" value="hbV2b0aABB_AhWQrYgL_fgebHRWlOjfHP_SESx3WtykjGQmbsYdCXiO4NyntvVEYWi_LHzX4MCySXwPqDZW0LyrihxkbLTj9"/>
            <input type="hidden" name="_csrf" value="hbV2b0aABB_AhWQrYgL_fgebHRWlOjfHP_SESx3WtykjGQmbsYdCXiO4NyntvVEYWi_LHzX4MCySXwPqDZW0LyrihxkbLTj9"/>
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>
<div class="container py-4">
    <h2 class="mb-1">Prescription Items</h2>
    <p class="text-muted mb-4">Add medicines for this consultation</p>

    <div class="card">
        <div class="card-body">
            <div id="errorAlert" class="alert alert-danger py-2 small d-none" role="alert">
                <span id="errorMessage"></span>
            </div>

            <form id="prescriptionForm">
                <input type="hidden" name="_csrf" value="hbV2b0aABB_AhWQrYgL_fgebHRWlOjfHP_SESx3WtykjGQmbsYdCXiO4NyntvVEYWi_LHzX4MCySXwPqDZW0LyrihxkbLTj9"/>
                <input type="hidden" name="prescriptionId" value="19"/>

                <div class="table-responsive mb-3">
                    <table class="table" id="itemsTable">
                        <thead>
                        <tr>
                            <th>Medicine</th>
                            <th>Dosage (M-A-N)</th>
                            <th style="width:80px">Qty</th>
                            <th>Duration</th>
                            <th>Timing / Instructions</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody id="itemsBody">
                        <tr class="item-row">
                            <td><input class="form-control form-control-sm" name="items[0].medicineName" value="" placeholder="Medicine name" required/></td>
                            <td><input class="form-control form-control-sm" name="items[0].dosage" value="" placeholder="0-0-1"/></td>
                            <td><input class="form-control form-control-sm" name="items[0].quantity" type="number" min="1" value="1" required/></td>
                            <td><input class="form-control form-control-sm" name="items[0].duration" value="" placeholder="30 Days"/></td>
                            <td><input class="form-control form-control-sm" name="items[0].instructions" value="" placeholder="After Food - Daily"/></td>
                            <td><button type="button" class="btn btn-sm btn-outline-danger remove-row"><i class="bi bi-trash"></i></button></td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="d-flex flex-wrap gap-2">
                    <button type="button" id="addRow" class="btn btn-outline-secondary">Add Medicine</button>
                    <button type="button" id="saveBtn" class="btn btn-primary ms-auto">Save Prescription</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
(function () {
    var rowIndex = 1;
    var csrfName = "_csrf";
    var csrfToken = "hbV2b0aABB_AhWQrYgL_fgebHRWlOjfHP_SESx3WtykjGQmbsYdCXiO4NyntvVEYWi_LHzX4MCySXwPqDZW0LyrihxkbLTj9";
    var errorAlert = document.getElementById('errorAlert');
    var errorMsg = document.getElementById('errorMessage');
    var saveBtn = document.getElementById('saveBtn');

    function showError(msg) {
        errorMsg.textContent = msg;
        errorAlert.classList.remove('d-none');
    }

    function hideError() {
        errorAlert.classList.add('d-none');
    }

    document.getElementById('addRow').addEventListener('click', function () {
        var tbody = document.getElementById('itemsBody');
        var tr = document.createElement('tr');
        tr.className = 'item-row';
        tr.innerHTML =
            '<td><input class="form-control form-control-sm" name="items[' + rowIndex + '].medicineName" placeholder="Medicine name" required /></td>' +
            '<td><input class="form-control form-control-sm" name="items[' + rowIndex + '].dosage" placeholder="0-0-1" /></td>' +
            '<td><input class="form-control form-control-sm" name="items[' + rowIndex + '].quantity" type="number" min="1" value="1" required /></td>' +
            '<td><input class="form-control form-control-sm" name="items[' + rowIndex + '].duration" placeholder="30 Days" /></td>' +
            '<td><input class="form-control form-control-sm" name="items[' + rowIndex + '].instructions" placeholder="After Food - Daily" /></td>' +
            '<td><button type="button" class="btn btn-sm btn-outline-danger remove-row"><i class="bi bi-trash"></i></button></td>';
        tbody.appendChild(tr);
        rowIndex++;
    });

    document.getElementById('itemsTable').addEventListener('click', function (e) {
        if (e.target.closest('.remove-row')) {
            var rows = document.querySelectorAll('.item-row');
            if (rows.length > 1) {
                e.target.closest('tr').remove();
            }
        }
    });

    document.getElementById('saveBtn').addEventListener('click', function () {
        var medInputs = document.querySelectorAll('#itemsBody input[name$=".medicineName"]');
        var anyFilled = false;
        medInputs.forEach(function (inp) {
            if (inp.value.trim() !== '') anyFilled = true;
        });
        if (!anyFilled) {
            showError('Please enter at least one medicine name.');
            return;
        }

        hideError();
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';

        var form = document.getElementById('prescriptionForm');
        var formData = new FormData(form);

        fetch('/doctor/prescription/create', {
            method: 'POST',
            body: formData,
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(function (response) {
            if (!response.ok) throw new Error('Server error: ' + response.status);
            return response.json();
        })
        .then(function (data) {
            if (data.success) {
                window.location.href = data.redirectUrl;
            } else {
                saveBtn.disabled = false;
                saveBtn.textContent = 'Save Prescription';
                showError(data.message || 'An unknown error occurred.');
            }
        })
        .catch(function (err) {
            saveBtn.disabled = false;
            saveBtn.textContent = 'Save Prescription';
            showError('Network or server error: ' + err.message);
        });
    });
}());
</script>
</body>
</html>
