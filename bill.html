<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Bill - Gaja Clinic</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark" style="background:#2e7d32;">
    <div class="container-fluid">
        <span class="navbar-brand">Gaja Clinic — Pharmacy</span>
        <form action="/account/logout" method="post"><input type="hidden" name="_csrf" value="fPlUnGBJP0fqzKZGMVe5rQZERt0MerDcvJdYltDBeElaFLJjRcgyrgRwC3_HqZEiU3qNnjMna-VqH9PxjfQ9o7KjTCxiINNT"/>
            <input type="hidden" name="_csrf" value="fPlUnGBJP0fqzKZGMVe5rQZERt0MerDcvJdYltDBeElaFLJjRcgyrgRwC3_HqZEiU3qNnjMna-VqH9PxjfQ9o7KjTCxiINNT"/>
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>
<div class="container py-4">
    <h2 class="mb-1">Create Bill</h2>
    <p class="text-muted mb-4">Prescription #<span>19</span></p>

    <div id="errorAlert" class="alert alert-danger py-2 small d-none"><span id="errorMessage"></span></div>

    <form id="billForm">
        <input type="hidden" name="_csrf" value="fPlUnGBJP0fqzKZGMVe5rQZERt0MerDcvJdYltDBeElaFLJjRcgyrgRwC3_HqZEiU3qNnjMna-VqH9PxjfQ9o7KjTCxiINNT"/>
        <input type="hidden" name="prescriptionId" value="19"/>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card mb-3">
                    <div class="card-header">Medicine Pricing</div>
                    <div class="table-responsive">
                        <table class="table mb-0">
                            <thead><tr><th>Medicine</th><th>Dosage</th><th>Qty</th><th>Duration</th><th>Price/unit (₹)</th></tr></thead>
                            <tbody>
                            <tr>
                                <td>
                                    <strong>Paracetamol</strong>
                                    <input type="hidden" name="items[0].prescriptionItemId" value="20"/>
                                    <input type="hidden" name="items[0].medicineName" value="Paracetamol"/>
                                    <input type="hidden" name="items[0].dosage" value="1-0-1"/>
                                    <input type="hidden" name="items[0].quantity" value="10"/>
                                    <input type="hidden" name="items[0].duration" value="5 Days"/>
                                    <input type="hidden" name="items[0].instructions" value="After Food"/>
                                </td>
                                <td>1-0-1</td>
                                <td>10</td>
                                <td>5 Days</td>
                                <td style="width:130px">
                                    <input type="number" step="0.01" min="0" class="form-control form-control-sm price-input"
                                           name="items[0].price" value="0E-30" required/>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between py-1 border-bottom"><span>Medicine Total</span><strong id="sumMedicines">₹0.00</strong></div>
                        <div class="d-flex justify-content-between py-1 border-bottom"><span>Consultation Fee</span><strong id="sumConsultation">₹0.00</strong></div>
                        <div class="d-flex justify-content-between py-1 border-bottom text-danger"><span>Discount</span><strong id="sumDiscount">- ₹0.00</strong></div>
                        <div class="d-flex justify-content-between py-2 fw-bold fs-5"><span>Total Payable</span><span class="text-success" id="sumTotal">₹0.00</span></div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card">
                    <div class="card-header">Payment Details</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Consultation Fee (₹)</label>
                            <input type="number" step="0.01" min="0" name="consultationFee" id="consultationFee"
                                   value="200.00" class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Discount (₹)</label>
                            <input type="number" step="0.01" min="0" name="discount" id="discount"
                                   value="0" class="form-control"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Payment Method</label>
                            <select name="paymentMethod" id="paymentMethod" class="form-select" required>
                                <option value="Cash">Cash</option>
                                <option value="UPI">UPI</option>
                            </select>
                        </div>
                        <div class="mb-3 d-none" id="utrDiv">
                            <label class="form-label">UTR Number</label>
                            <input type="text" name="utrNo" id="utrNo" class="form-control" placeholder="Enter UPI reference"/>
                        </div>
                        <button type="button" id="submitBill" class="btn btn-primary w-100">Process Bill</button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
<script>
(function () {
    var submitBtn = document.getElementById('submitBill');
    var errorAlert = document.getElementById('errorAlert');
    var errorMsg = document.getElementById('errorMessage');

    function showError(msg) {
        errorMsg.textContent = msg;
        errorAlert.classList.remove('d-none');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function hideError() { errorAlert.classList.add('d-none'); }

    document.getElementById('paymentMethod').addEventListener('change', function () {
        document.getElementById('utrDiv').classList.toggle('d-none', this.value !== 'UPI');
        if (this.value !== 'UPI') document.getElementById('utrNo').value = '';
    });

    function recalc() {
        var prices = document.querySelectorAll('.price-input');
        var qtys = document.querySelectorAll('input[name$=".quantity"]');
        var medTotal = 0;
        prices.forEach(function (inp, idx) {
            var price = parseFloat(inp.value) || 0;
            var qty = parseFloat(qtys[idx] ? qtys[idx].value : 1) || 1;
            medTotal += price * qty;
        });
        var consult = parseFloat(document.getElementById('consultationFee').value) || 0;
        var disc = parseFloat(document.getElementById('discount').value) || 0;
        var total = medTotal + consult - disc;
        document.getElementById('sumMedicines').textContent = '₹' + medTotal.toFixed(2);
        document.getElementById('sumConsultation').textContent = '₹' + consult.toFixed(2);
        document.getElementById('sumDiscount').textContent = '- ₹' + disc.toFixed(2);
        document.getElementById('sumTotal').textContent = '₹' + (total < 0 ? '0.00' : total.toFixed(2));
    }
    document.querySelectorAll('.price-input, #consultationFee, #discount').forEach(function (el) {
        el.addEventListener('input', recalc);
    });
    recalc();

    submitBtn.addEventListener('click', function () {
        hideError();
        var allValid = true;
        document.querySelectorAll('.price-input').forEach(function (inp) {
            if (inp.value === '' || parseFloat(inp.value) < 0) allValid = false;
        });
        if (!allValid) { showError('Please enter a valid price (0 or more) for all medicines.'); return; }
        if (document.getElementById('paymentMethod').value === 'UPI' && document.getElementById('utrNo').value.trim() === '') {
            showError('UTR number is required for UPI payments.'); return;
        }
        submitBtn.disabled = true;
        submitBtn.textContent = 'Processing...';
        fetch('/pharmacy/bill/create', {
            method: 'POST',
            body: new FormData(document.getElementById('billForm')),
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(function (r) { if (!r.ok) throw new Error('Server error: ' + r.status); return r.json(); })
        .then(function (data) {
            if (data.success) window.location.href = data.redirectUrl;
            else { submitBtn.disabled = false; submitBtn.textContent = 'Process Bill'; showError(data.message || 'Error'); }
        })
        .catch(function (err) {
            submitBtn.disabled = false; submitBtn.textContent = 'Process Bill';
            showError('Network or server error: ' + err.message);
        });
    });
}());
</script>
</body>
</html>
