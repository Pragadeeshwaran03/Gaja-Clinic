<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gaja Clinic</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body.page-login {
            min-height: 100vh;
            background: linear-gradient(135deg, #0d47a1 0%, #1565c0 50%, #2e7d32 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 1rem 3rem rgba(0,0,0,.2);
        }
        .login-header {
            background: #0d47a1;
            color: #fff;
            text-align: center;
            padding: 2rem 1.5rem 1.5rem;
        }
        .login-logo {
            font-size: 2.5rem;
            margin-bottom: .5rem;
        }
        .login-body { padding: 1.5rem; }
    </style>
</head>
<body class="page-login">
<div class="login-card">
    <div class="login-header">
        <div class="login-logo"><i class="bi bi-heart-pulse-fill"></i></div>
        <h4 class="mb-1 fw-bold">Gaja Clinic</h4>
        <p class="mb-0 opacity-75 small">Staff Sign In</p>
    </div>
    <div class="login-body">
        <form action="/account/login" method="post"><input type="hidden" name="_csrf" value="dZlMQSdcfF_TATE07t48-UY_jCrBPJNf_codtTGCh6ND9rzpRal9IhVtHWf-YgFX1_MIznZboROnWqZym_ss1gfht8BykozR"/>
            
            <input type="hidden" name="_csrf" value="dZlMQSdcfF_TATE07t48-UY_jCrBPJNf_codtTGCh6ND9rzpRal9IhVtHWf-YgFX1_MIznZboROnWqZym_ss1gfht8BykozR"/>

            
            

            <div class="mb-3">
                <label for="email" class="form-label"><i class="bi bi-person me-1"></i>Email or Username</label>
                <input type="text" id="email" name="email" class="form-control form-control-lg"
                       placeholder="admin or admin@gaja.local" autofocus required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label"><i class="bi bi-lock me-1"></i>Password</label>
                <input type="password" id="password" name="password" class="form-control form-control-lg"
                       placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg">
                <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
            </button>
        </form>
        <p class="text-center text-muted small mt-3 mb-0">
            <a href="/" class="text-decoration-none"><i class="bi bi-arrow-left me-1"></i>Back to website</a>
        </p>
    </div>
</div>

</html>
