<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescription Saved - Gaja Clinic</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/gaja-theme.css}">
</head>
<body class="gaja-app">
<nav class="navbar navbar-dark gaja-navbar">
    <div class="container-fluid">
        <span class="navbar-brand">Gaja Clinic — Doctor</span>
        <form th:action="@{/account/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>
<div class="container py-4">
    <div class="alert alert-success">
        <h4><i class="bi bi-check-circle me-2"></i>Prescription <span th:text="${prescription.prescriptionNumber}"></span> saved</h4>
        <p class="mb-1">Patient: <strong th:text="${prescription.patient != null ? prescription.patient.name : '—'}"></strong></p>
        <p class="mb-0 small">Status: <span th:text="${prescription.status}"></span> — sent to pharmacy for billing.</p>
    </div>

    <div class="card mb-4" th:if="${prescription.items != null && !prescription.items.isEmpty()}">
        <div class="card-header">Medicines Prescribed</div>
        <div class="table-responsive">
            <table class="table table-sm mb-0">
                <thead><tr><th>Medicine</th><th>Dosage</th><th>Qty</th><th>Duration</th></tr></thead>
                <tbody>
                <tr th:each="item : ${prescription.items}">
                    <td th:text="${item.medicineName}"></td>
                    <td th:text="${item.dosage}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="${item.duration}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card mb-4" th:if="${prescription.patientCondition != null and !prescription.patientCondition.isEmpty()}">
        <div class="card-header">Patient Condition</div>
        <div class="card-body">
            <p class="mb-0" th:text="${prescription.patientCondition}" style="white-space: pre-wrap;"></p>
        </div>
    </div>

    <div class="card mb-4" th:if="${prescription.notes != null and !prescription.notes.isEmpty()}">
        <div class="card-header">Doctor's Notes / Advice</div>
        <div class="card-body">
            <p class="mb-0" th:text="${prescription.notes}" style="white-space: pre-wrap;"></p>
        </div>
    </div>

    <a th:href="@{/doctor/patient/create}" class="btn btn-primary">Register Another Patient</a>
</div>
</body>
</html>
