<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Prescriptions - Gaja Clinic</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/gaja-theme.css}">
</head>
<body class="gaja-app">
<nav class="navbar navbar-dark gaja-navbar">
    <div class="container-fluid">
        <span class="navbar-brand">Gaja Clinic — Pharmacy</span>
        <form th:action="@{/account/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>
<div class="container py-4">
    <h2 class="mb-1">Pending Prescriptions</h2>
    <p class="text-muted mb-4">Prescriptions awaiting pharmacy billing</p>

    <div class="card" th:if="${prescriptions.isEmpty()}">
        <div class="card-body text-center text-muted py-5">No prescriptions awaiting pharmacy.</div>
    </div>

    <div class="table-responsive" th:if="${!prescriptions.isEmpty()}">
        <table class="table table-hover bg-white">
            <thead class="table-light">
            <tr>
                <th>Prescription #</th>
                <th>Patient</th>
                <th>Doctor</th>
                <th>Date</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${prescriptions}">
                <td><span class="badge bg-primary" th:text="${p.prescriptionNumber}"></span></td>
                <td><strong th:text="${p.patient != null ? p.patient.name : '—'}"></strong></td>
                <td th:text="${p.doctor != null && p.doctor.user != null ? p.doctor.user.fullName : '—'}"></td>
                <td class="text-muted small" th:text="${#temporals.format(p.dateCreated, 'dd/MM/yyyy HH:mm')}"></td>
                <td class="text-nowrap">
                    <a th:href="@{/pharmacy/prescription/{id}(id=${p.id})}" class="btn btn-sm btn-outline-primary">View</a>
                    <a th:href="@{/pharmacy/bill/create(prescriptionId=${p.id})}" class="btn btn-sm btn-success">Bill</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
