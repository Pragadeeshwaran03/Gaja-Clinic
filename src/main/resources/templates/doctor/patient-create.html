<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Patient - Gaja Clinic</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/gaja-theme.css}">
    <style>
        .vitals-section {
            background: linear-gradient(135deg, #fff5f5 0%, #fff0f3 100%);
            border: 1px solid #f5c2c7;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
        }
        .vitals-section .section-title {
            color: #842029;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .vital-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #495057;
            margin-bottom: 0.3rem;
        }
        .vital-unit {
            font-size: 0.75rem;
            color: #868e96;
            font-weight: 400;
        }
        .input-with-unit {
            position: relative;
        }
        .input-with-unit .unit-badge {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            padding: 0 0.75rem;
            background: #f8f9fa;
            border-left: 1px solid #dee2e6;
            border-radius: 0 6px 6px 0;
            font-size: 0.75rem;
            color: #6c757d;
            font-weight: 500;
            pointer-events: none;
        }
        .input-with-unit .form-control {
            padding-right: 3.5rem;
        }
        .spo2-badge {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .bp-badge {
            background: #fce4ec;
            color: #b71c1c;
        }
        .temp-badge {
            background: #fff3e0;
            color: #e65100;
        }
        .pr-badge {
            background: #e3f2fd;
            color: #0d47a1;
        }
        .cbg-badge {
            background: #f3e5f5;
            color: #6a1b9a;
        }
    </style>
</head>
<body class="gaja-app">
<nav class="navbar navbar-dark gaja-navbar">
    <div class="container-fluid">
        <span class="navbar-brand"><i class="bi bi-heart-pulse-fill me-1"></i> Gaja Clinic — Doctor</span>
        <div class="d-flex align-items-center text-white gap-3">
            <span><i class="bi bi-person-circle me-1"></i><span th:text="${user.displayName}">Doctor</span></span>
            <form th:action="@{/account/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div class="container py-4">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <h2 class="mb-1">Register Patient</h2>
    <p class="text-muted mb-4">Search existing patients or register a new one</p>

    <!-- ── Unified Search ───────────────────────────────────────── -->
    <div class="card mb-4 border-primary">
        <div class="card-header bg-primary text-white fw-bold">
            <i class="bi bi-search me-1"></i> Search Patient by Phone Number or Name
        </div>
        <div class="card-body">
            <div class="input-group">
                <input type="text" id="searchUnified" class="form-control form-control-lg"
                       placeholder="Enter phone number or patient name…" autocomplete="off" autofocus/>
                <button type="button" id="btnUnifiedSearch" class="btn btn-primary btn-lg">Search</button>
            </div>
            <div id="unifiedSearchResult" class="mt-2 small"></div>
        </div>
    </div>

    <!-- ── New Patient Form ─────────────────────────────────────── -->
    <div class="card">
        <div class="card-header">New Patient</div>
        <div class="card-body">
            <form th:action="@{/doctor/patient/create}" th:object="${patientCreateDto}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- Basic Info -->
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Name <span class="text-danger">*</span></label>
                        <input th:field="*{name}" class="form-control" placeholder="Full name"/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Mobile <span class="text-danger">*</span></label>
                        <input th:field="*{mobile}" class="form-control" id="patientMobile" placeholder="10-digit mobile"/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('mobile')}" th:errors="*{mobile}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Age <span class="text-danger">*</span></label>
                        <input th:field="*{age}" type="number" min="0" class="form-control"/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Gender <span class="text-danger">*</span></label>
                        <select th:field="*{gender}" class="form-select">
                            <option value="">-- Select --</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                        <div class="text-danger small" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
                    </div>
                </div>

                <!-- ── Vitals Section ───────────────────────────────────── -->
                <div class="vitals-section mt-2 mb-3">
                    <div class="section-title">
                        <i class="bi bi-activity"></i> Patient Vitals
                    </div>
                    <div class="row g-3">

                        <!-- Height -->
                        <div class="col-6 col-md-3">
                            <label class="vital-label">Ht <span class="vital-unit">cm</span></label>
                            <div class="input-with-unit">
                                <input th:field="*{heightCm}" type="number" step="0.1" min="0" max="300"
                                       class="form-control" placeholder="e.g. 165"/>
                                <span class="unit-badge">cm</span>
                            </div>
                            <div class="text-danger small" th:if="${#fields.hasErrors('heightCm')}" th:errors="*{heightCm}"></div>
                        </div>

                        <!-- Weight -->
                        <div class="col-6 col-md-3">
                            <label class="vital-label">Wt <span class="vital-unit">kgs</span></label>
                            <div class="input-with-unit">
                                <input th:field="*{weightKg}" type="number" step="0.1" min="0" max="500"
                                       class="form-control" placeholder="e.g. 70"/>
                                <span class="unit-badge">kg</span>
                            </div>
                            <div class="text-danger small" th:if="${#fields.hasErrors('weightKg')}" th:errors="*{weightKg}"></div>
                        </div>

                        <!-- Temperature -->
                        <div class="col-6 col-md-3">
                            <label class="vital-label">Temp <span class="vital-unit">°C / °F</span></label>
                            <div class="input-with-unit">
                                <input th:field="*{temperature}" type="text" class="form-control"
                                       placeholder="e.g. 98.6°F"/>
                                <span class="unit-badge temp-badge">°</span>
                            </div>
                            <div class="text-danger small" th:if="${#fields.hasErrors('temperature')}" th:errors="*{temperature}"></div>
                        </div>

                        <!-- Blood Pressure -->
                        <div class="col-6 col-md-3">
                            <label class="vital-label">BP <span class="vital-unit">mmHg</span></label>
                            <div class="input-with-unit">
                                <input th:field="*{bloodPressure}" type="text" class="form-control"
                                       placeholder="120/80"/>
                                <span class="unit-badge bp-badge">mmHg</span>
                            </div>
                            <div class="text-danger small" th:if="${#fields.hasErrors('bloodPressure')}" th:errors="*{bloodPressure}"></div>
                        </div>

                        <!-- Pulse Rate -->
                        <div class="col-6 col-md-3">
                            <label class="vital-label">PR <span class="vital-unit">/min</span></label>
                            <div class="input-with-unit">
                                <input th:field="*{pulseRate}" type="text" class="form-control"
                                       placeholder="e.g. 72"/>
                                <span class="unit-badge pr-badge">/min</span>
                            </div>
                            <div class="text-danger small" th:if="${#fields.hasErrors('pulseRate')}" th:errors="*{pulseRate}"></div>
                        </div>

                        <!-- CBG -->
                        <div class="col-6 col-md-3">
                            <label class="vital-label">CBG <span class="vital-unit">mg/dL</span></label>
                            <div class="input-with-unit">
                                <input th:field="*{cbg}" type="text" class="form-control"
                                       placeholder="e.g. 110"/>
                                <span class="unit-badge cbg-badge">mg/dL</span>
                            </div>
                            <div class="text-danger small" th:if="${#fields.hasErrors('cbg')}" th:errors="*{cbg}"></div>
                        </div>

                        <!-- SpO2 -->
                        <div class="col-6 col-md-3">
                            <label class="vital-label">SpO₂ <span class="vital-unit">%</span></label>
                            <div class="input-with-unit">
                                <input th:field="*{spo2}" type="number" step="0.1" min="0" max="100"
                                       class="form-control" placeholder="e.g. 98"/>
                                <span class="unit-badge spo2-badge">%</span>
                            </div>
                            <div class="text-danger small" th:if="${#fields.hasErrors('spo2')}" th:errors="*{spo2}"></div>
                        </div>

                    </div>
                </div>
                <!-- ── End Vitals ───────────────────────────────────────── -->

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-person-plus-fill me-1"></i> Register &amp; Start Consultation
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
// ── Unified Search: phone number OR name ───────────────────────────
function renderPatients(patients, resultEl, query) {
    if (!patients || patients.length === 0) {
        resultEl.innerHTML = '<div class="alert alert-info py-2 mb-0">No patient found. Fill the form below to register.</div>';
        var mobileField = document.getElementById('patientMobile');
        if (mobileField) mobileField.value = query;
        return;
    }
    if (patients.length === 1) {
        const p = patients[0];
        resultEl.innerHTML = `<div class="alert alert-success py-2 mb-0">
            Found: <strong>${p.name}</strong> (<code>${p.patientCode}</code>)
            &nbsp;<a href="/doctor/consultation/create?patientId=${p.patientId}" class="btn btn-sm btn-primary">Consult</a>
            &nbsp;<a href="${p.historyUrl}" class="btn btn-sm btn-outline-secondary">History</a>
        </div>`;
    } else {
        let html = '<div class="alert alert-success py-2 mb-0"><strong>Patients found:</strong><ul class="list-unstyled mb-0 mt-2">';
        patients.forEach(p => {
            html += `<li class="mb-1">${p.name} (<code>${p.patientCode}</code>)
                <a href="/doctor/consultation/create?patientId=${p.patientId}" class="btn btn-sm btn-primary ms-2">Consult</a>
                <a href="${p.historyUrl}" class="btn btn-sm btn-outline-secondary ms-1">History</a></li>`;
        });
        html += '</ul></div>';
        resultEl.innerHTML = html;
    }
}

async function doUnifiedSearch() {
    const q = document.getElementById('searchUnified').value.trim();
    const result = document.getElementById('unifiedSearchResult');
    if (!q) { result.innerHTML = '<span class="text-warning">Enter a phone number or name.</span>'; return; }
    result.innerHTML = '<span class="text-muted">Searching...</span>';
    const res = await fetch('/doctor/patient/search-unified?q=' + encodeURIComponent(q));
    const data = await res.json();
    renderPatients(data.patients, result, q);
}

document.getElementById('btnUnifiedSearch').addEventListener('click', doUnifiedSearch);
document.getElementById('searchUnified').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { e.preventDefault(); doUnifiedSearch(); }
});
</script>
</body>
</html>
