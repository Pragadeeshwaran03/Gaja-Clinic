<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Gaja Clinic Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/gaja-theme.css}">
</head>
<body class="gaja-app">
<nav class="navbar navbar-dark gaja-navbar">
    <div class="container-fluid">
        <span class="navbar-brand"><i class="bi bi-shield-check me-1"></i> Gaja Clinic — Admin</span>
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/main-admin/home}" class="btn btn-outline-light btn-sm">Dashboard</a>
            <a th:href="@{/main-admin/pdf-archive}" class="btn btn-outline-light btn-sm">PDF Archive</a>
            <a th:href="@{/main-admin/reports}" class="btn btn-outline-light btn-sm">Reports</a>
            <a th:href="@{/main-admin/settings}" class="btn btn-outline-light btn-sm">Settings</a>
            <form th:action="@{/account/logout}" method="post" class="ms-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div class="container py-4" th:replace="${content}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
