<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gaja Clinic &amp; Medicals</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/gaja-theme.css}">
</head>
<body class="page-login">
<div class="login-card">
    <div class="login-header">
        <div class="login-logo"><i class="bi bi-heart-pulse-fill"></i></div>
        <h4 class="mb-1 fw-bold">Gaja Clinic &amp; Medicals</h4>
        <p class="mb-0 opacity-75 small">Staff Sign In</p>
    </div>
    <div class="login-body">
        <form th:action="@{/account/login}" method="post">
            <input type="hidden" th:if="${loginDto.returnUrl}" name="returnUrl" th:value="${loginDto.returnUrl}"/>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div th:if="${errorMessage}" class="alert alert-danger py-2 small" th:text="${errorMessage}"></div>
            <div th:if="${successMessage}" class="alert alert-success py-2 small" th:text="${successMessage}"></div>

            <div class="mb-3">
                <label for="email" class="form-label"><i class="bi bi-person me-1"></i>Email or Username</label>
                <input type="text" id="email" name="email" class="form-control form-control-lg"
                       placeholder="admin or admin@gaja.local" autofocus required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label"><i class="bi bi-lock me-1"></i>Password</label>
                <input type="password" id="password" name="password" class="form-control form-control-lg"
                       placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg">
                <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
            </button>
        </form>
        <p class="text-center text-muted small mt-3 mb-0">
            <a th:href="@{/}" class="text-decoration-none"><i class="bi bi-arrow-left me-1"></i>Back to website</a>
        </p>
    </div>
</div>
</body>
</html>
