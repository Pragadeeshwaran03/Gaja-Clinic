spring.application.name=gaja-clinic

server.port=5226

# MySQL (PascalCase tables/columns)
spring.datasource.url=jdbc:mysql://localhost:3306/gaja_clinic_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA — validate only; never alter existing schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.implicit_naming_strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Session (8-hour sliding timeout)
server.servlet.session.timeout=8h

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.gaja.clinic=INFO

# App settings
app.server-port=5226
app.public-base-url=
app.use-sslip-for-local-share=true
app.shorten-urls-for-whatsapp=true

# PDF storage
app.pdf.storage-path=classpath:static/pdfs
app.pdf.filesystem-path=src/main/resources/static/pdfs
app.static.filesystem-path=src/main/resources/static

# Clinic defaults
app.clinic.name=Gaja Clinic & Medicals
app.clinic.tagline=Your Health, Our Priority
app.clinic.phone=98844 43162
app.clinic.address=No.39, 2nd Main Road, Chitlapakkam, Tambaram Sanatorium, Chennai - 600047

# SMTP placeholders
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=placeholder@gmail.com
spring.mail.password=placeholder_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
