<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/admin-layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>PDF Archive - Gaja Clinic</title>
</head>
<body>
<main>
    <h2 class="mb-1"><i class="bi bi-file-earmark-pdf me-2"></i>PDF Archive</h2>
    <p class="text-muted mb-4">Search, view, download, email and share prescriptions</p>

    <div th:if="${success}" class="alert alert-success py-2" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/main-admin/pdf-archive}" method="get" class="row g-3 align-items-end">
                <div class="col-md-3 col-sm-6">
                    <label class="form-label small fw-semibold">Patient Name</label>
                    <input type="text" name="patientName" th:value="${filter.patientName}" class="form-control form-control-sm" placeholder="Search patient..."/>
                </div>
                <div class="col-md-2 col-sm-6">
                    <label class="form-label small fw-semibold">Mobile</label>
                    <input type="text" name="mobile" th:value="${filter.mobile}" class="form-control form-control-sm" placeholder="e.g. 98844..."/>
                </div>
                <div class="col-md-2 col-sm-6">
                    <label class="form-label small fw-semibold">Doctor</label>
                    <input type="text" name="doctorName" th:value="${filter.doctorName}" class="form-control form-control-sm" placeholder="Doctor name..."/>
                </div>
                <div class="col-md-2 col-sm-6">
                    <label class="form-label small fw-semibold">Date From</label>
                    <input type="date" name="dateFrom" th:value="${filter.dateFrom}" class="form-control form-control-sm"/>
                </div>
                <div class="col-md-2 col-sm-6">
                    <label class="form-label small fw-semibold">Date To</label>
                    <input type="date" name="dateTo" th:value="${filter.dateTo}" class="form-control form-control-sm"/>
                </div>
                <div class="col-md-1 col-sm-6 d-grid gap-1">
                    <button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-search"></i> Search</button>
                    <a th:href="@{/main-admin/pdf-archive}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-x-circle"></i> Clear</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card" th:if="${filter.records.isEmpty()}">
        <div class="card-body text-center text-muted py-5">No PDF records found matching your criteria.</div>
    </div>

    <div class="card" th:if="${!filter.records.isEmpty()}">
        <div class="card-header">
            <span th:text="${filter.records.size()} + ' record(s) found'">0 records</span>
        </div>
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Patient</th>
                    <th>Mobile</th>
                    <th>Doctor</th>
                    <th>Visit Date</th>
                    <th>Bill No</th>
                    <th>Amount</th>
                    <th class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${filter.records}">
                    <td>
                        <strong th:text="${r.patient?.name}">Patient</strong><br/>
                        <small class="text-muted" th:text="${r.patient?.patientCode}">PAT</small>
                    </td>
                    <td th:text="${r.patient?.mobile}">mobile</td>
                    <td th:text="${r.doctor?.user?.fullName ?: '—'}">Doctor</td>
                    <td th:text="${#temporals.format(r.visitDate, 'dd MMM yyyy')}">date</td>
                    <td><span class="badge bg-light text-dark border" th:text="${r.bill?.billNo}">BILL</span></td>
                    <td class="fw-semibold text-success"
                        th:text="${r.bill != null ? '₹' + #numbers.formatDecimal(r.bill.finalAmount, 1, 2) : '—'}">₹0</td>
                    <td class="text-center">
                        <div class="btn-group btn-group-sm">
                            <a th:href="${r.filePath}" target="_blank" class="btn btn-outline-primary" title="View / Print">
                                <i class="bi bi-printer"></i>
                            </a>
                            <a th:href="@{/main-admin/pdf-archive/download(id=${r.id})}" class="btn btn-outline-success" title="Download">
                                <i class="bi bi-download"></i>
                            </a>
                            <button type="button" class="btn btn-outline-info email-btn"
                                    th:attr="data-id=${r.id},data-patient=${r.patient?.name}" title="Send via Email">
                                <i class="bi bi-envelope"></i>
                            </button>
                            <a href="javascript:void(0);" class="btn btn-outline-success"
                               th:attr="onclick=|shareWhatsApp('${r.patient?.mobile}', '${r.patient?.name}', '${r.filePath}')|"
                               title="Share on WhatsApp">
                                <i class="bi bi-whatsapp"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="emailModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <form th:action="@{/main-admin/pdf-archive/send-email}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="modal-header">
                        <h5 class="modal-title"><i class="bi bi-envelope me-2"></i>Send PDF via Email</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" name="id" id="emailRecordId"/>
                        <p class="small text-muted mb-2">Sending PDF for <strong id="emailPatientName"></strong></p>
                        <label for="toEmail" class="form-label">Recipient Email</label>
                        <input type="email" name="toEmail" id="toEmail" class="form-control" required placeholder="patient@example.com"/>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-sm btn-primary"><i class="bi bi-send me-1"></i>Send</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.email-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                document.getElementById('emailRecordId').value = this.dataset.id;
                document.getElementById('emailPatientName').textContent = this.dataset.patient || '';
                document.getElementById('toEmail').value = '';
                new bootstrap.Modal(document.getElementById('emailModal')).show();
            });
        });

        function shareWhatsApp(mobile, patientName, pdfPath) {
            var pdfUrl = window.location.origin + pdfPath;
            var message = encodeURIComponent('Hello ' + patientName + ', here is your prescription from Gaja Clinic & Medicals:\n' + pdfUrl);
            var cleanMobile = (mobile || '').replace(/[\s\-\(\)]/g, '');
            if (cleanMobile && !cleanMobile.startsWith('+') && !cleanMobile.startsWith('91')) {
                cleanMobile = '91' + cleanMobile;
            }
            var waUrl = cleanMobile ? 'https://wa.me/' + cleanMobile + '?text=' + message : 'https://wa.me/?text=' + message;
            window.open(waUrl, '_blank');
        }
    </script>
</main>
</body>
</html>
