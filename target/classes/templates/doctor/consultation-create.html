<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Consultation - Gaja Clinic</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/gaja-theme.css}">
</head>
<body class="gaja-app">
<nav class="navbar navbar-dark gaja-navbar">
    <div class="container-fluid">
        <span class="navbar-brand">Gaja Clinic — Doctor</span>
        <form th:action="@{/account/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>
<div class="container py-4">
    <h2 class="mb-1">Start Consultation</h2>
    <p class="text-muted mb-4">Begin prescription for this patient</p>

    <div class="card" style="max-width:480px">
        <div class="card-body">
            <form th:action="@{/doctor/consultation/create}" th:object="${consultationCreateDto}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" th:field="*{patientId}"/>
                <div class="mb-4">
                    <div class="text-muted small">Patient</div>
                    <div class="fs-5" th:text="*{patientName}">Patient Name</div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Start Prescription</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
